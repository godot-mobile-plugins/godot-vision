#
# addon/config/addon-build.properties - extra properties and scripts for the :addon module.
# Read by BuildConfig.addonExtraProperties and BuildConfig.addonExtraGradle.
#

# -- Optional: extra properties ------------------------------------------------
#
# Keys with the `extra.` prefix are forwarded to the :addon project.extra.
# The prefix is stripped, so `extra.myProperty=value` becomes
# project.extra["myProperty"] = "value" inside :addon.
#
# Example:
#   extra.myProperty=value

# -- Optional: extra Gradle scripts -------------------------------------------
#
# Keys with the `gradle.` prefix are applied to :addon via project.apply(from = …).
# The value is a file path relative to the repo root (or absolute).
#
# Example:
#   gradle.extraGradle=addon/config/extra.gradle.kts
